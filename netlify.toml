# Configuración de build para Netlify (deploy automático desde GitHub)
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Headers de seguridad básicos
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache largo para imágenes (cambian de nombre si cambian)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Redirect del admin viejo (marcadores / PWA instalada con la URL anterior)
[[redirects]]
  from = "/admin.html"
  to = "/admin/"
  status = 301
