# Configuración de build para Netlify (deploy automático desde GitHub)
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Headers de seguridad básicos
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # Fuerza HTTPS durante 1 año (evita downgrade a http)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    # CSP: limita de qué dominios se pueden cargar recursos.
    # Incluye: Firebase (gstatic + *.googleapis.com), GA (googletagmanager +
    # google-analytics), Chart.js (jsdelivr), fuentes Google, y Supabase
    # (libro de reclamaciones). 'unsafe-inline' es necesario por los scripts
    # y handlers inline del proyecto. Si agregas un dominio nuevo, añádelo aquí.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://www.googletagmanager.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.googleapis.com https://www.googletagmanager.com https://www.google-analytics.com https://*.google-analytics.com https://*.analytics.google.com https://bdsedbwasllyvwobjhjx.supabase.co; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; form-action 'self'"

# Cache largo para imágenes (cambian de nombre si cambian)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Redirect del admin viejo (marcadores / PWA instalada con la URL anterior)
[[redirects]]
  from = "/admin.html"
  to = "/admin/"
  status = 301
